# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Keep this matrix aligned with pyproject.toml and README.md:
        # 3.10 is the minimum supported CPython; 3.14 is the latest covered version.
        python-version: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (clean environment, as the quickstart does)
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"

      - name: Quickstart smoke (prepare -> extract -> compose)
        run: |
          .venv/bin/python scripts/prepare_sprite_run.py --help > /dev/null
          cp -r tests/fixtures/run /tmp/smoke-run
          .venv/bin/python scripts/extract_sprite_row_frames.py --run-dir /tmp/smoke-run
          .venv/bin/python scripts/compose_sprite_atlas.py --run-dir /tmp/smoke-run
          test -f /tmp/smoke-run/sprite-sheet-alpha.png
          test -f /tmp/smoke-run/manifest.json

      - name: Tests
        run: .venv/bin/python -m pytest -q
